server:
  port: 8090 # Different port for mentor-service to avoid clash with student-service

spring:
  application:
    name: about_us_service

  # 1. MySQL Configuration (Relational Data)
  datasource:
    url: jdbc:mysql://localhost:3306/vidya_sampadana_db?createDatabaseIfNotExist=true
    username: root
    password: Anni@2005
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. JPA/Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates tables based on your Java Entities
    show-sql: true # Helpful for debugging across multiple services
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # 3. MongoDB Configuration (NoSQL Data) - optional
  # data:
  #   mongodb:
  #     uri: mongodb://localhost:27017/mentor_logs_db

# 4. Eureka Client Configuration
eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: false
    register-with-eureka: false

# 5. Documentation (Swagger) Settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
