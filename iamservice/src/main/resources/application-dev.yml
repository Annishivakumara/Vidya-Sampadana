server:
  port: 8086

spring:
  # Database Connection
  datasource:
    url: jdbc:mysql://localhost:3306/vidya_auth2
    username: root
    password: Anni@2005

  # JPA and Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false


logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate: INFO
    com.vidyasampadana: DEBUG


security:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKey_2026_@#$_VeryLongString_12345}
    issuer: ${JWT_ISSUER:api.substring.com}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTl_SECONDS:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}