server:
  port: 8083 # Student=8081, Mentor=8082, Session=8083, Payment=8084

spring:
  application:
    name: Kcet-service

  datasource:
    url: jdbc:mysql://localhost:3306/vidya_sampadana_db?createDatabaseIfNotExist=true
    username: root
    password: Anni@2005
