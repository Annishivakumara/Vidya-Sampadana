<!-- frontend/pages/students.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidya Sampadana</title>

    <!-- Tailwind CSS - Just ONE line! -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<!-- ============ NAVBAR ============ -->
<nav class="bg-blue-600 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">🎓 Vidya Sampadana</h1>
        <ul class="flex gap-6">
            <li><a href="index.html" class="hover:text-blue-200">Home</a></li>
            <li><a href="students.html" class="font-bold border-b-2">Students</a></li>
            <li><a href="courses.html" class="hover:text-blue-200">Courses</a></li>
            <li><a href="mentors.html" class="hover:text-blue-200">Mentors</a></li>
            <li><a href="#" class="hover:text-blue-200" onclick="logout()">Logout</a></li>
        </ul>
    </div>
</nav>

<!-- ============ MAIN CONTENT ============ -->
<main class="max-w-6xl mx-auto p-8">

    <!-- Header Section -->
    <div class="mb-8">
        <h2 class="text-4xl font-bold mb-2">Students Management</h2>
        <p class="text-gray-600">Manage all student information in one place</p>
    </div>

    <!-- Action Bar -->
    <div class="bg-white p-4 rounded-lg shadow mb-6 flex gap-4">
        <input
                type="text"
                placeholder="🔍 Search by name or email..."
                id="searchInput"
                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <button
                onclick="openAddModal()"
                class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold transition"
        >
            ➕ Add Student
        </button>
    </div>

    <!-- Loading Spinner (Hidden by default) -->
    <div id="loadingSpinner" class="hidden text-center py-8">
        <div class="inline-block">
            <div class="border-4 border-blue-200 border-t-blue-600 rounded-full w-8 h-8 animate-spin"></div>
        </div>
        <p class="mt-2 text-gray-600">Loading students...</p>
    </div>

    <!-- Error Message (Hidden by default) -->
    <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        <span id="errorText"></span>
    </div>

    <!-- Success Message (Hidden by default) -->
    <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
        <span id="successText"></span>
    </div>

    <!-- Students Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-100 border-b">
            <tr>
                <th class="px-6 py-4 text-left font-semibold text-gray-700">Name</th>
                <th class="px-6 py-4 text-left font-semibold text-gray-700">Email</th>
                <th class="px-6 py-4 text-left font-semibold text-gray-700">Phone</th>
                <th class="px-6 py-4 text-left font-semibold text-gray-700">Status</th>
                <th class="px-6 py-4 text-left font-semibold text-gray-700">Actions</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            <!-- JavaScript will fill this -->
            <tr>
                <td colspan="5" class="px-6 py-4 text-center text-gray-500">
                    Click "Add Student" to start...
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

<!-- ============ ADD/EDIT MODAL ============ -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">

        <!-- Modal Header -->
        <div class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
            <h3 id="modalTitle" class="text-xl font-bold">Add Student</h3>
            <button onclick="closeModal()" class="text-2xl font-bold hover:text-blue-200">&times;</button>
        </div>

        <!-- Modal Body (Form) -->
        <form id="studentForm" class="px-6 py-4" onsubmit="saveStudent(event)">

            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">First Name *</label>
                <input
                        type="text"
                        id="firstName"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="John"
                >
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Last Name *</label>
                <input
                        type="text"
                        id="lastName"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Doe"
                >
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Email *</label>
                <input
                        type="email"
                        id="email"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="john@example.com"
                >
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Phone *</label>
                <input
                        type="tel"
                        id="phone"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="9876543210"
                >
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Date of Birth</label>
                <input
                        type="date"
                        id="dob"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">Gender</label>
                <select
                        id="gender"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    <option value="">Select Gender</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>

            <!-- Form Buttons -->
            <div class="flex gap-4">
                <button
                        type="submit"
                        class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold transition"
                >
                    Save
                </button>
                <button
                        type="button"
                        onclick="closeModal()"
                        class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-lg font-semibold transition"
                >
                    Cancel
                </button>
            </div>

        </form>
    </div>
</div>

<!-- ============ JAVASCRIPT ============ -->
<script>
    // API Configuration
    const API_URL = 'http://localhost:8001/api';
    let students = [];
    let isEditing = false;
    let editingId = null;

    // ===== PAGE LOAD =====
    window.addEventListener('DOMContentLoaded', () => {
      loadStudents();
      setupSearchFilter();
    });

    // ===== LOAD STUDENTS =====
    async function loadStudents() {
      try {
        showLoading();

        const response = await fetch(`${API_URL}/students`);

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        students = await response.json();
        renderTable();
        hideError();

      } catch (error) {
        showError('Failed to load students: ' + error.message);
        console.error('Error loading students:', error);
      } finally {
        hideLoading();
      }
    }

    // ===== RENDER TABLE =====
    function renderTable() {
      const tableBody = document.getElementById('tableBody');

      if (students.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="5" class="px-6 py-8 text-center text-gray-500">
              No students found. Click "Add Student" to create one.
            </td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = students.map(student => `
        <tr class="border-b hover:bg-gray-50 transition">
          <td class="px-6 py-4">
            <div class="font-semibold">${student.firstName} ${student.lastName}</div>
            <div class="text-sm text-gray-500">${student.id}</div>
          </td>
          <td class="px-6 py-4">${student.email}</td>
          <td class="px-6 py-4">${student.phone}</td>
          <td class="px-6 py-4">
            <span class="px-3 py-1 rounded-full text-sm font-semibold ${
              student.status === 'ACTIVE'
                ? 'bg-green-100 text-green-800'
                : 'bg-red-100 text-red-800'
            }">
              ${student.status}
            </span>
          </td>
          <td class="px-6 py-4 flex gap-2">
            <button
              onclick="editStudent('${student.id}')"
              class="text-blue-500 hover:text-blue-700 font-semibold text-sm"
            >
              ✏️ Edit
            </button>
            <button
              onclick="deleteStudent('${student.id}')"
              class="text-red-500 hover:text-red-700 font-semibold text-sm"
            >
              🗑️ Delete
            </button>
          </td>
        </tr>
      `).join('');
    }

    // ===== OPEN ADD MODAL =====
    function openAddModal() {
      isEditing = false;
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add Student';
      document.getElementById('studentForm').reset();
      document.getElementById('modal').classList.remove('hidden');
    }

    // ===== OPEN EDIT MODAL =====
    async function editStudent(id) {
      try {
        const response = await fetch(`${API_URL}/students/${id}`);

        if (!response.ok) {
          throw new Error('Failed to load student');
        }

        const student = await response.json();

        document.getElementById('firstName').value = student.firstName;
        document.getElementById('lastName').value = student.lastName;
        document.getElementById('email').value = student.email;
        document.getElementById('phone').value = student.phone;
        document.getElementById('dob').value = student.dateOfBirth || '';
        document.getElementById('gender').value = student.gender || '';

        isEditing = true;
        editingId = id;
        document.getElementById('modalTitle').textContent = 'Edit Student';
        document.getElementById('modal').classList.remove('hidden');

      } catch (error) {
        showError('Failed to load student: ' + error.message);
      }
    }

    // ===== CLOSE MODAL =====
    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('studentForm').reset();
      isEditing = false;
      editingId = null;
    }

    // ===== SAVE STUDENT =====
    async function saveStudent(event) {
      event.preventDefault();

      const studentData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        dateOfBirth: document.getElementById('dob').value || null,
        gender: document.getElementById('gender').value || null,
      };

      try {
        showLoading();

        let response;
        if (isEditing) {
          // UPDATE
          response = await fetch(`${API_URL}/students/${editingId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(studentData)
          });
        } else {
          // CREATE
          response = await fetch(`${API_URL}/students`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(studentData)
          });
        }

        if (!response.ok) {
          throw new Error('Failed to save student');
        }

        showSuccess(isEditing ? 'Student updated!' : 'Student created!');
        closeModal();
        await loadStudents();

      } catch (error) {
        showError('Error: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    // ===== DELETE STUDENT =====
    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) {
        return;
      }

      try {
        showLoading();

        const response = await fetch(`${API_URL}/students/${id}`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          throw new Error('Failed to delete student');
        }

        showSuccess('Student deleted!');
        await loadStudents();

      } catch (error) {
        showError('Error: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    // ===== SEARCH FILTER =====
    function setupSearchFilter() {
      document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = students.filter(s =>
          s.firstName.toLowerCase().includes(query) ||
          s.lastName.toLowerCase().includes(query) ||
          s.email.toLowerCase().includes(query)
        );

        students = filtered;
        renderTable();
      });
    }

    // ===== UI HELPERS =====
    function showLoading() {
      document.getElementById('loadingSpinner').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loadingSpinner').classList.add('hidden');
    }

    function showError(message) {
      document.getElementById('errorText').textContent = message;
      document.getElementById('errorMessage').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('errorMessage').classList.add('hidden');
      }, 5000);
    }

    function hideError() {
      document.getElementById('errorMessage').classList.add('hidden');
    }

    function showSuccess(message) {
      document.getElementById('successText').textContent = message;
      document.getElementById('successMessage').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('successMessage').classList.add('hidden');
      }, 3000);
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        // Clear token from localStorage
        localStorage.removeItem('authToken');
        // Redirect to login
        window.location.href = 'login.html';
      }
    }

</script>

</body>
</html>
