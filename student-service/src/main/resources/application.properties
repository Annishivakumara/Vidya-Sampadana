# Server Configuration
server.port=8082
spring.application.name=student-service

# 1. MySQL Configuration (Relational Data)
spring.datasource.url=jdbc:mysql://localhost:3306/vidya_sampadana_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Anni@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 3. MongoDB Configuration (NoSQL Data) - Uncomment if needed
# spring.data.mongodb.uri=mongodb://localhost:27017/student_logs_db

# 4. Eureka Client Configuration
eureka.client.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

# 5. Documentation (Swagger) Settings
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
